<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLyfe API - 500 Internal Server Error</title>
    <style>
        :root {
            --bg-color: #050505;
            --neon-red: #ff0000;
            --neon-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-red);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 40px;
            position: relative;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            text-shadow: var(--neon-shadow);
            animation: flicker 2s infinite;
        }

        h2 {
            font-size: 1.5rem;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        p {
            font-size: 1.1rem;
            margin: 20px 0;
            color: white; /* El texto es blanco para contrastar */
            opacity: 0.7;
        }

        .warning-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: flicker 3s infinite alternate;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: var(--neon-shadow); opacity: 1; }
            20%, 22%, 24%, 55% { text-shadow: none; opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-icon">⚠</div>
        <h1>500</h1>
        <h2>Fallo Crítico del Motor</h2>
        <p>[ALERTA] Las células han mutado de forma inestable.</p>
        <p>Nuestro equipo de IA está intentando contener la brecha de datos.</p>
        <p>Intenta recargar en unos minutos.</p>
    </div>
</body>
</html>
