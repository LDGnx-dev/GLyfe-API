<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLyfe API - 404 Not Found</title>
    <style>
        :root {
            --bg-color: #0d1117; /* Fondo oscuro de GitHub */
            --neon-green: #00ff00;
            --neon-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            border: 2px solid var(--neon-green);
            padding: 40px;
            box-shadow: var(--neon-shadow);
            border-radius: 8px;
            position: relative;
        }

        /* Efecto Glitch de texto */
        h1 {
            font-size: 6rem;
            margin: 0;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                         0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        p {
            font-size: 1.2rem;
            margin: 20px 0;
            opacity: 0.8;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            color: var(--neon-green);
            text-decoration: none;
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background-color: var(--neon-green);
            color: var(--bg-color);
            box-shadow: var(--neon-shadow);
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>[SISTEMA] Ruta no encontrada en la Matriz.</p>
        <p>Las células han migrado a una dirección desconocida.</p>
        <a href="/" class="back-link">&gt; Volver a la Base (Landing)</a>
    </div>
</body>
</html>
